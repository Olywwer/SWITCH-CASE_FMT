<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MusicFlix</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Musica.css">
</head>

<body>

<div class="container mt-4">

  <h1 class="text-center text-danger mb-4">MusicFlix</h1>

  
<div class="ms-auto">
    <a href="index.html" class="btn btn-outline-light btn-sm me-2">🎬 Filmes</a>
    <a href="Tema.html" class="btn btn-outline-light btn-sm">🎨 Tema</a>
</div>
<br>
<br>
  <div class="row mb-3">
    <div class="col-md-6">
      <select id="genero" class="form-select">
        <option value="">Escolha um gênero</option>
        <option value="1">Rock</option>
        <option value="2">Pop</option>
        <option value="3">Hip Hop</option>
        <option value="4">Eletrônica</option>
        <option value="5">Jazz</option>
        <option value="6">Clássica</option>
      </select>
    </div>

    <div class="col-md-3">
      <button class="btn btn-danger w-100" onclick="carregarMusicas()"> Ver</button>
    </div>

    <div class="col-md-3">
      <button class="btn btn-warning w-100" onclick="mostrarFavoritos()">❤️ Favoritos</button>
    </div>
  </div>
  
  <div id="musicas" class="row"></div>
</div>


<div id="playerFixo" class="player-fixo d-none">

  <span id="nomeMusica"> Nenhuma</span>

 
  <button id="btnPlay" onclick="togglePlay()">▶️</button>

  
  <input type="range" id="progresso" value="0">

  
  <div class="equalizer">
    <span></span><span></span><span></span>
  </div>

  <button onclick="favoritarAtual()">❤️</button>

  <audio id="audioPlayer"></audio>

</div>

<script src="Musica.js"></script>
</body>
</html>
