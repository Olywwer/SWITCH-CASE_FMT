<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Filmes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  
  <link rel="stylesheet" href="Filmes.css">
</head>

<body class="bg-dark text-light">
  


<nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">
  <div class="container flex-column align-items-start">

   
    <h1 class="mb-3 text-light"> Catálogo de Filmes</h1>
      
<div class="ms-auto">
    <a href="Musica.html" class="btn btn-outline-light btn-sm me-2">🎧 Música</a>
    <a href="Tema.html" class="btn btn-outline-light btn-sm">🎨 Tema</a>
    
    
    
</div>
  </div>
</nav>

<header class="text-center p-5 mb-4 rounded-4 text-white"
        style="background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
  
  <div class="container">
    <h1 class="display-3 fw-bold mb-3" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
       DESCUBRA FILMES INCRÍVEIS 
    </h1>

    <p class="lead fs-4 mb-4">
      Escolha um gênero e mergulhe nas melhores recomendações
    </p>

    <a href="#filmes" class="btn btn-light btn-lg fw-bold px-4 py-2"
       style="border-radius: 30px; transition: 0.3s;">
       Explorar Agora
    </a>
  </div>

</header>

<div class="container">

  
<div class="card p-4 bg-dark text-light border-0 shadow mb-4">
  <div class="row g-3 align-items-center">

   
    <div class="col-md-5">
      <select id="categoria" class="form-select form-select-lg text-center">
        <option value="">Escolha um gênero de filme</option>
        <option value="1">Ação</option>
        <option value="2">Comédia</option>
        <option value="3">Drama</option>
        <option value="4">Terror</option>
        <option value="5">Ficção Científica</option>
        <option value="6">Romance</option>
      </select>
    </div>

  
    <div class="col-md-3 d-grid">
      <button class="btn btn-danger btn-lg" onclick="carregarFilmes()">
        <i class="bi bi-play-fill me-2"></i> Ver Filmes
      </button>
    </div>

    
    <div class="col-md-4 d-grid">
      <button class="btn btn-warning btn-lg" onclick="mostrarFavoritos()">
        <i class="bi bi-heart-fill me-2"></i> Ver Favoritos
      </button>
    </div>

  </div>
</div>


  <div id="filmes" class="row g-4"></div>

</div>



<footer class="text-center mt-5 mb-3 text-secondary">
  <small>© 2026 MovieFlix </small>
</footer>


<script src="Filmes.js"></script>

</body>
</html>
